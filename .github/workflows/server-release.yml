name: Server Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing vX.Y.Z tag to build and publish"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: server-release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  build:
    name: Linux ${{ matrix.architecture }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            architecture: x64
          - runner: ubuntu-22.04-arm
            architecture: arm64

    steps:
      - name: Validate release tag
        shell: bash
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must use vX.Y.Z format: $RELEASE_TAG" >&2
            exit 1
          fi

      - uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Verify source version
        shell: bash
        run: |
          source_version="$(sed -n 's/^set(SESIVO_VERSION "\([^"]*\)").*/\1/p' CMakeLists.txt)"
          if [[ "v${source_version}" != "$RELEASE_TAG" ]]; then
            echo "CMake version v${source_version} does not match $RELEASE_TAG" >&2
            exit 1
          fi

      - name: Cache FetchContent dependencies
        uses: actions/cache@v6
        with:
          path: build/_deps
          key: server-deps-${{ matrix.architecture }}-${{ hashFiles('CMakeLists.txt', 'cmake/**') }}

      - name: Configure server
        run: >-
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          -DJAM_BUILD_CLIENT=OFF
          -DJAM_BUILD_TESTS=OFF

      - name: Build server
        run: cmake --build build --target server --parallel

      - name: Package server
        shell: bash
        run: |
          archive="sesivo-server-${RELEASE_TAG}-linux-${{ matrix.architecture }}.tar.gz"
          mkdir -p package dist
          cp build/sesivo-server package/
          cp LICENSE THIRD_PARTY_NOTICES.md package/
          tar -C package -czf "dist/${archive}" .
          cd dist
          sha256sum "$archive" > "${archive}.sha256"

      - name: Upload server artifact
        uses: actions/upload-artifact@v7
        with:
          name: sesivo-server-${{ env.RELEASE_TAG }}-linux-${{ matrix.architecture }}
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish GitHub Release assets
    needs: build
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Download server artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: sesivo-server-${{ env.RELEASE_TAG }}-linux-*
          path: dist
          merge-multiple: true

      - name: Create combined checksum file
        shell: bash
        run: |
          cd dist
          sha256sum sesivo-server-*.tar.gz | sort -k2 > SHA256SUMS

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          mapfile -t assets < <(find dist -maxdepth 1 -type f -printf '%p\n' | sort)
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" "${assets[@]}" \
              --verify-tag \
              --generate-notes \
              --title "Sesivo $RELEASE_TAG"
          fi
