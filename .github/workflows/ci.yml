name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  windows-release:
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Cache FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: deps-windows-${{ hashFiles('CMakeLists.txt', 'cmake/**') }}

      - name: Configure
        run: cmake -B build -DJAM_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --config Release --parallel 8

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure --no-tests=error
