name: CI

on:
  workflow_dispatch:

jobs:
  release:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows Release
            os: windows-latest
          - name: Ubuntu Release
            os: ubuntu-latest
          - name: macOS Release
            os: macos-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Linux JUCE dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libcurl4-openssl-dev \
            libfontconfig1-dev \
            libfreetype-dev \
            libgl1-mesa-dev \
            libx11-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxext-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxrender-dev

      - name: Cache FetchContent dependencies
        uses: actions/cache@v6
        with:
          path: build/_deps
          key: deps-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'cmake/**') }}

      - name: Configure
        run: cmake -B build -DJAM_BUILD_TESTS=ON -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel 8

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure --no-tests=error

  sanitizers:
    name: Linux ASan and UBSan
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libasound2-dev libcurl4-openssl-dev libfontconfig1-dev libfreetype-dev libgl1-mesa-dev libx11-dev libxcomposite-dev libxcursor-dev libxext-dev libxinerama-dev libxrandr-dev libxrender-dev
      - name: Configure
        env:
          CC: clang
          CXX: clang++
        run: cmake -B build-sanitize -DJAM_BUILD_CLIENT=ON -DJAM_BUILD_TESTS=ON -DCMAKE_BUILD_TYPE=RelWithDebInfo -DCMAKE_C_FLAGS='-fsanitize=address,undefined -fno-omit-frame-pointer' -DCMAKE_CXX_FLAGS='-fsanitize=address,undefined -fno-omit-frame-pointer' -DCMAKE_EXE_LINKER_FLAGS='-fsanitize=address,undefined'
      - name: Build
        run: cmake --build build-sanitize --parallel 8
      - name: Test
        run: ctest --test-dir build-sanitize --output-on-failure --no-tests=error

  fuzz:
    name: Network parser fuzz smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - name: Install Clang
        run: sudo apt-get update && sudo apt-get install -y clang
      - name: Configure
        env:
          CC: clang
          CXX: clang++
        run: cmake -B build-fuzz -DJAM_BUILD_CLIENT=OFF -DJAM_BUILD_TESTS=OFF -DJAM_ENABLE_FUZZING=ON -DCMAKE_BUILD_TYPE=RelWithDebInfo
      - name: Build
        run: cmake --build build-fuzz --target packet_parser_fuzz --parallel 8
      - name: Fuzz
        run: ./build-fuzz/packet_parser_fuzz -max_total_time=60 -timeout=2
